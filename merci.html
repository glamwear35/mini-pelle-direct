<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commande confirmée — Mini Pelle Direct</title>
<style>
  body { background:#0a0a0a; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .box { max-width:500px; padding:3rem; }
  h1 { color:#FFD700; font-size:3rem; margin-bottom:1rem; }
  p { color:#aaa; margin-bottom:2rem; line-height:1.7; }
  a { background:#FFD700; color:#000; padding:0.8rem 2rem; text-decoration:none; font-weight:700; }

  /* ── Menu hamburger mobile ── */
  .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
  .nav-toggle span {
    display: block; width: 24px; height: 2px;
    background: #fff; margin: 5px 0; transition: all .3s;
  }
  .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-toggle.open span:nth-child(2) { opacity: 0; }
  .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  @media(max-width: 768px) {
    nav {
      display: none; flex-direction: column; gap: 0;
      position: absolute; top: 64px; left: 0; right: 0;
      background: #111; padding: 10px 0; z-index: 99;
      border-top: 2px solid #FFD700;
    }
    nav.open { display: flex; }
    nav a { padding: 12px 20px; font-size: 1rem; border-radius: 0; border-bottom: 1px solid #222; }
    .nav-toggle { display: block; }
  }

  </style>
</head>
<body>
  <div class="box">
    <h1>✅ Merci !</h1>
    <p>Votre commande a bien été enregistrée. Nous vous contacterons dans les plus brefs délais pour organiser la livraison.</p>
    <p>📞 06 99 16 87 77</p>
    <a href="/index.html">Retour au site</a>
  </div>

  padding:14px 20px;
  text-align:center;
  box-shadow:0 -3px 15px rgba(0,0,0,0.3);
">

    color:#111;

    font-size:1.1rem;

<script>
  if(window.innerWidth <= 768) document.getElementById('mobile-cta').style.display='block';
  window.addEventListener('resize', function(){
    document.getElementById('mobile-cta').style.display = window.innerWidth <= 768 ? 'block' : 'none';
  });
</script>

     background:#25D366;

     width:56px;
     height:56px;

     display:flex;
     align-items:center;
     justify-content:center;
     font-size:1.6rem;
     box-shadow:0 4px 15px rgba(0,0,0,0.25);
     text-decoration:none;

   "

   onmouseout="this.style.transform='scale(1)'"
   title="Nous contacter sur WhatsApp">💬</a>


<script>
  function toggleNav() {
    const nav = document.querySelector('nav');
    const btn = document.getElementById('navToggle');
    nav.classList.toggle('open');
    btn.classList.toggle('open');
  }
  // Fermer menu au clic sur un lien
  document.querySelectorAll('nav a').forEach(a => {
    a.addEventListener('click', () => {
      document.querySelector('nav').classList.remove('open');
      document.getElementById('navToggle').classList.remove('open');
    });
  });
</script>

</body>
</html>
