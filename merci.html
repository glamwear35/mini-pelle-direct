<!DOCTYPE html>

  .box { max-width:500px; padding:3rem; }
  h1 { color:#FFD700; font-size:3rem; margin-bottom:1rem; }
  p { color:#aaa; margin-bottom:2rem; line-height:1.7; }

</style>

<body>
  <div class="box">
    <h1>✅ Merci !</h1>

<!-- Bouton téléphone fixe mobile -->
<div id="mobile-cta" style="
  display:none;
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:9999;
  background:#FFD700;
  padding:14px 20px;
  text-align:center;
  box-shadow:0 -3px 15px rgba(0,0,0,0.3);
">
  <a href="tel:0699168777" style="
    color:#111;
    font-weight:900;
    font-size:1.1rem;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  ">📞 Appeler — 06 99 16 87 77</a>
</div>
<script>
  if(window.innerWidth <= 768) document.getElementById('mobile-cta').style.display='block';
  window.addEventListener('resize', function(){
    document.getElementById('mobile-cta').style.display = window.innerWidth <= 768 ? 'block' : 'none';
  });
</script>

</body>
